<html lang="zh"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日腐人二下 · 演员关系图鉴</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&amp;family=Noto+Sans+JP:wght@300;400;500&amp;display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --red: #D94F6B; --red-soft: #fdf0f3;
  --blue: #4A7FC1; --blue-soft: #edf3fb;
  --purple: #7C5CBF; --purple-soft: #f2eefb;
  --gray: #9CA3AF; --gray-soft: #f3f4f6;
  --bg: #FDFCFA; --surface: #fff;
  --border: #EDE9E3; --text: #1C1917;
  --muted: #9B8E83; --accent: #C9A96E;
}
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
header { padding: 0.9rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-shrink: 0; flex-wrap: wrap; }
.brand h1 { font-family: 'Noto Serif JP', serif; font-size: 1.05rem; font-weight: 600; letter-spacing: 0.08em; }
.brand p { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
.controls { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
.legend { display: flex; gap: 0.8rem; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.7rem; color: var(--muted); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }
.filters { display: flex; gap: 4px; }
.fbtn { padding: 3px 10px; border-radius: 20px; font-size: 0.68rem; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; }
.fbtn:hover { background: var(--bg); }
.fbtn.on { background: var(--text); color: #fff; border-color: var(--text); }
.publish-btn { padding: 4px 12px; border-radius: 6px; font-size: 0.7rem; border: 1px solid var(--accent); background: transparent; color: var(--accent); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; }
.publish-btn:hover { background: #fdf8f2; }
.publish-btn.loading { opacity: 0.6; pointer-events: none; }
.publish-btn.success { border-color: #4CAF50; color: #4CAF50; }
.publish-btn.error { border-color: #E24B4A; color: #E24B4A; }
.loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 100; }
.loading-screen.hidden { display: none; }
.loading-spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 0.78rem; color: var(--muted); }
.main { flex: 1; display: flex; overflow: hidden; }
.sidebar { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar input { margin: 0.7rem; padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.76rem; font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); outline: none; }
.sidebar input:focus { border-color: var(--accent); }
.alist { flex: 1; overflow-y: auto; padding: 4px 0; }
.alist::-webkit-scrollbar { width: 3px; }
.alist::-webkit-scrollbar-thumb { background: var(--border); }
.aitem { display: flex; align-items: center; gap: 7px; padding: 6px 0.9rem; cursor: pointer; transition: background 0.12s; border-left: 2px solid transparent; font-size: 0.78rem; }
.aitem:hover { background: var(--bg); }
.aitem.on { background: #fdf8f2; border-left-color: var(--accent); }
.adot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.aname { flex: 1; color: var(--text); line-height: 1.3; }
.abadge { font-size: 0.6rem; padding: 1px 5px; border-radius: 3px; font-weight: 500; flex-shrink: 0; }
.graph { flex: 1; position: relative; }
svg { width: 100%; height: 100%; }
.hint { position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%); font-size: 0.66rem; color: var(--muted); background: rgba(255,255,255,0.9); padding: 3px 12px; border-radius: 20px; border: 1px solid var(--border); pointer-events: none; white-space: nowrap; }
.detail { width: 250px; flex-shrink: 0; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transform: translateX(250px); transition: transform 0.25s ease; }
.detail.open { transform: translateX(0); }
.dhead { padding: 1.1rem 1.1rem 0.9rem; border-bottom: 1px solid var(--border); position: relative; }
.dclose { position: absolute; top: 0.8rem; right: 0.8rem; width: 20px; height: 20px; border: 1px solid var(--border); border-radius: 4px; background: none; cursor: pointer; font-size: 11px; color: var(--muted); display: flex; align-items: center; justify-content: center; }
.dclose:hover { background: var(--bg); }
.dname { font-family: 'Noto Serif JP', serif; font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
.dtags { display: flex; gap: 5px; flex-wrap: wrap; }
.dtag { font-size: 0.65rem; padding: 2px 7px; border-radius: 3px; font-weight: 500; }
.dbody { flex: 1; overflow-y: auto; padding: 0.9rem 1.1rem; }
.dbody::-webkit-scrollbar { width: 3px; }
.dbody::-webkit-scrollbar-thumb { background: var(--border); }
.dsec { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin: 0.8rem 0 0.4rem; }
.dsec:first-child { margin-top: 0; }
.wcard { background: var(--bg); border-radius: 5px; padding: 0.5rem 0.65rem; margin-bottom: 5px; border-left: 3px solid transparent; }
.wtitle { font-size: 0.73rem; color: var(--text); line-height: 1.4; margin-bottom: 2px; }
.wmeta { display: flex; gap: 5px; align-items: center; }
.wdate { font-size: 0.62rem; color: var(--muted); }
.wrtag { font-size: 0.58rem; padding: 1px 4px; border-radius: 3px; }
.chips { display: flex; flex-wrap: wrap; gap: 4px; }
.chip { font-size: 0.68rem; padding: 2px 8px; border-radius: 12px; border: 1px solid var(--border); color: var(--muted); cursor: pointer; background: var(--bg); transition: all 0.15s; }
.chip:hover { border-color: var(--accent); color: var(--text); background: #fdf8f2; }
.dstats { padding: 0.6rem 1.1rem; border-top: 1px solid var(--border); display: flex; gap: 1rem; flex-shrink: 0; }
.stat { text-align: center; }
.snum { font-size: 1rem; font-weight: 600; font-family: 'Noto Serif JP', serif; }
.slbl { font-size: 0.58rem; color: var(--muted); }
.bubble { opacity: 0.1; }
.bubble-label { font-size: 10px; font-family: 'Noto Sans JP', sans-serif; opacity: 0.5; pointer-events: none; font-weight: 500; }
.link { stroke: #DDD8D0; stroke-width: 1.5; fill: none; opacity: 0.7; }
.link.hl { stroke: #C9A96E; stroke-width: 2.5; opacity: 1; }
.link.dim { opacity: 0.04; }
.node circle { stroke-width: 2; cursor: pointer; }
.node text { font-family: 'Noto Sans JP', sans-serif; font-size: 10px; pointer-events: none; fill: #4a4540; }
.node.dim circle { opacity: 0.12; }
.node.dim text { opacity: 0.08; }
.sales-badge { font-size: 0.58rem; padding: 1px 5px; border-radius: 3px; background: #fdf8f2; color: var(--accent); border: 1px solid #f0debb; margin-top: 3px; display: inline-block; }
</style>
</head>
<body>

<div class="loading-screen hidden" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">⚠️ 请通过 GitHub Pages 访问以加载数据</div>
</div>

<header>
  <div class="brand">
    <h1>日腐人二下 · 演员关系图鉴</h1>
    <p>数据来源：社区整理 · 统计至 2026/3 · 气泡=事务所 · 连线=共演BL</p>
  </div>
  <div class="controls">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#D94F6B"></div>攻</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4A7FC1"></div>受</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7C5CBF"></div>两栖</div>
    </div>
    <div class="filters">
      <button class="fbtn on" onclick="setFilter('全部',this)">全部</button>
      <button class="fbtn" onclick="setFilter('攻',this)">攻</button>
      <button class="fbtn" onclick="setFilter('受',this)">受</button>
      <button class="fbtn" onclick="setFilter('两栖',this)">两栖</button>
    </div>
    <button class="publish-btn loading" id="publish-btn" onclick="publishToGitHub()">发布中...</button>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <input id="search" type="text" placeholder="搜索演员..." oninput="renderList(this.value)">
    <div class="alist" id="alist"></div>
  </div>
  <div class="graph">
    <svg id="svg"><g transform="translate(-395.6680790386499,-112.28118501942464) scale(1.9534170579244576)"><g></g><g></g><g></g></g></svg>
    <div class="hint">滚轮缩放 · 拖拽节点 · 点击查看详情</div>
  </div>
  <div class="detail" id="detail">
    <div class="dhead">
      <button class="dclose" onclick="closeDetail()">✕</button>
      <div class="dname" id="d-name"></div>
      <div class="dtags" id="d-tags"></div>
    </div>
    <div class="dbody">
      <div class="dsec">出演作品</div>
      <div id="d-works"></div>
      <div class="dsec">共演过</div>
      <div class="chips" id="d-costars"></div>
    </div>
    <div class="dstats" id="d-stats"></div>
  </div>
</div>

<script>
const GITHUB_CONFIG = {
  owner: 'SIAK-q', repo: 'JBL-NETWORK',
  path: 'bl-network.html', branch: 'main'
};

function getToken() { return localStorage.getItem('gh_token_bl'); }
function promptToken() {
  const t = prompt('请输入 GitHub Personal Access Token（只存在你的浏览器里）：');
  if(t&&t.trim()) { localStorage.setItem('gh_token_bl', t.trim()); return t.trim(); }
  return null;
}

async function publishToGitHub() {
  const btn = document.getElementById('publish-btn');
  let token = getToken();
  if(!token) { token = promptToken(); if(!token) return; }
  btn.textContent = '发布中...'; btn.classList.add('loading');
  try {
    const getRes = await fetch(
      `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`,
      { headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' } }
    );
    if(getRes.status===401) { localStorage.removeItem('gh_token_bl'); throw new Error('Token 无效'); }
    const { sha } = await getRes.json();
    const content = btoa(unescape(encodeURIComponent(document.documentElement.outerHTML)));
    const putRes = await fetch(
      `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`,
      { method:'PUT', headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},
        body: JSON.stringify({ message:`update: 日腐图鉴 ${new Date().toLocaleDateString('zh-CN')}`, content, sha, branch: GITHUB_CONFIG.branch }) }
    );
    if(putRes.ok) {
      btn.textContent='✓ 发布成功！'; btn.classList.remove('loading'); btn.classList.add('success');
      setTimeout(()=>{ btn.textContent='↑ 发布到 GitHub'; btn.classList.remove('success'); }, 3000);
    } else throw new Error('推送失败');
  } catch(e) {
    btn.textContent='✗ '+e.message; btn.classList.remove('loading'); btn.classList.add('error');
    setTimeout(()=>{ btn.textContent='↑ 发布到 GitHub'; btn.classList.remove('error'); }, 4000);
  }
}

const RC = {'攻':'#D94F6B','受':'#4A7FC1','两栖':'#7C5CBF','未知':'#9CA3AF'};
const RB = {'攻':'#fdf0f3','受':'#edf3fb','两栖':'#f2eefb','未知':'#f3f4f6'};
const AGENCY_COLORS = {
  '研音':'#E8A0B4','ebidan':'#F0B86E','LDH':'#7EC8C8','アミューズ':'#A8C87E',
  'オスカー':'#C8A0E8','MR8':'#E8C880','TopCoat':'#80B8E8','渡辺':'#E8A080',
  'A-Light':'#A0D4B8','Sun Music':'#F4A460','アソビシステム':'#DDA0DD','ジャニーズ系':'#B8D4F0',
};

let ACTORS = [], SALES = {}, costarMap = {}, agencyMap = {}, allDramas = {};
let curFilter = '全部';

// ========== 从 actors.json 加载数据 ==========
async function loadData() {
  try {
    const res = await fetch('actors.json');
    if(!res.ok) throw new Error('fetch失败');
    const data = await res.json();
    ACTORS = data.actors;
    SALES = data.sales || {};
  } catch(e) {
    // 本地打开时fetch会跨域失败，降级用内嵌数据提示
    document.querySelector('.loading-text').textContent = '⚠️ 请通过 GitHub Pages 访问以加载数据';
    return false;
  }
  return true;
}

function buildMaps() {
  costarMap = {}; agencyMap = {}; allDramas = {};
  ACTORS.forEach(a => { costarMap[a.name] = new Set(); });
  ACTORS.forEach(a => a.works.forEach(w => {
    if(!allDramas[w.title]) allDramas[w.title] = [];
    allDramas[w.title].push(a.name);
  }));
  Object.values(allDramas).forEach(actors => {
    actors.forEach((a,i) => actors.forEach((b,j) => { if(i!==j) costarMap[a].add(b); }));
  });
  ACTORS.forEach(a => {
    if(a.agency) {
      if(!agencyMap[a.agency]) agencyMap[a.agency] = [];
      agencyMap[a.agency].push(a.name);
    }
  });
}

function getRole(a) {
  const rs = a.works.map(w=>w.role);
  const atk=rs.includes('攻'), rec=rs.includes('受');
  if(atk&&rec) return '两栖'; if(atk) return '攻'; if(rec) return '受'; return '未知';
}

const svgEl = document.getElementById('svg');
const svg = d3.select(svgEl);
const g = svg.append('g');
svg.call(d3.zoom().scaleExtent([0.15,4]).on('zoom', e => g.attr('transform', e.transform)));
svg.on('click', ()=>{ closeDetail(); clearHL(); });
const bubbleG = g.append('g'), linkG = g.append('g'), nodeG = g.append('g');
let simulation, linkSel, nodeSel;
function W() { return svgEl.clientWidth; }
function H() { return svgEl.clientHeight; }

function buildLinks(filter) {
  const links=[], seen=new Set();
  Object.entries(allDramas).forEach(([title, actors]) => {
    const valid = actors.filter(n=>{ const a=ACTORS.find(x=>x.name===n); return a&&(filter==='全部'||getRole(a)===filter); });
    for(let i=0;i<valid.length;i++) for(let j=i+1;j<valid.length;j++) {
      const key=[valid[i],valid[j]].sort().join('|||');
      if(!seen.has(key)) { seen.add(key); links.push({source:valid[i],target:valid[j],title}); }
    }
  });
  return links;
}

function agencyForce(nodes, strength) {
  return function(alpha) {
    Object.entries(agencyMap).forEach(([agency, names]) => {
      const group = nodes.filter(n=>names.includes(n.id));
      if(group.length<2) return;
      const cx=d3.mean(group,d=>d.x), cy=d3.mean(group,d=>d.y);
      group.forEach(d=>{ d.vx+=(cx-d.x)*strength*alpha; d.vy+=(cy-d.y)*strength*alpha; });
    });
  };
}

function drawBubbles(nodes) {
  bubbleG.selectAll('*').remove();
  Object.entries(agencyMap).forEach(([agency, names]) => {
    const group=nodes.filter(n=>names.includes(n.id));
    if(!group.length) return;
    const color=AGENCY_COLORS[agency]||'#aaa';
    if(group.length===1) {
      const d=group[0];
      bubbleG.append('circle').attr('cx',d.x).attr('cy',d.y).attr('r',38).attr('fill',color).attr('class','bubble');
      bubbleG.append('text').attr('x',d.x).attr('y',d.y-42).attr('text-anchor','middle').attr('class','bubble-label').attr('fill',color).text(agency);
    } else {
      const xs=group.map(d=>d.x), ys=group.map(d=>d.y);
      const cx=d3.mean(xs), cy=d3.mean(ys);
      const rx=Math.max(55,(d3.max(xs)-d3.min(xs))/2+50), ry=Math.max(55,(d3.max(ys)-d3.min(ys))/2+50);
      bubbleG.append('ellipse').attr('cx',cx).attr('cy',cy).attr('rx',rx).attr('ry',ry).attr('fill',color).attr('class','bubble');
      bubbleG.append('text').attr('x',cx).attr('y',cy-ry-8).attr('text-anchor','middle').attr('class','bubble-label').attr('fill',color).text(`${agency} (${group.length})`);
    }
  });
}

function init() {
  const actors=ACTORS.filter(a=>curFilter==='全部'||getRole(a)===curFilter);
  const links=buildLinks(curFilter);
  const nodes=actors.map(a=>({ id:a.name,role:getRole(a),agency:a.agency||'',sub:a.sub||'',works:a.works, x:W()/2+(Math.random()-.5)*300, y:H()/2+(Math.random()-.5)*300 }));
  if(simulation) simulation.stop();
  simulation=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(links).id(d=>d.id).distance(120).strength(0.35))
    .force('charge',d3.forceManyBody().strength(-280))
    .force('center',d3.forceCenter(W()/2,H()/2))
    .force('collision',d3.forceCollide(40))
    .force('agency',agencyForce(nodes,0.18));
  linkG.selectAll('*').remove();
  linkSel=linkG.selectAll('line').data(links).join('line').attr('class','link');
  nodeG.selectAll('*').remove();
  nodeSel=nodeG.selectAll('g').data(nodes).join('g').attr('class','node')
    .call(d3.drag()
      .on('start',(e,d)=>{ if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',(e,d)=>{ d.fx=e.x; d.fy=e.y; })
      .on('end',(e,d)=>{ if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
    )
    .on('click',(e,d)=>{ e.stopPropagation(); selectActor(d.id); });
  nodeSel.append('circle').attr('r',18).attr('fill',d=>RB[d.role]).attr('stroke',d=>RC[d.role]);
  nodeSel.append('text').attr('dy',33).attr('text-anchor','middle').text(d=>d.id);
  simulation.on('tick',()=>{
    linkSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);
    drawBubbles(nodes);
  });
  renderList();
}

function selectActor(name) {
  const actor=ACTORS.find(a=>a.name===name); if(!actor) return;
  const role=getRole(actor), costars=[...(costarMap[name]||[])];
  document.getElementById('d-name').textContent=name;
  const tags=document.getElementById('d-tags');
  tags.innerHTML=`<span class="dtag" style="background:${RB[role]};color:${RC[role]}">${role==='两栖'?'攻受两栖':role}</span>`;
  if(actor.agency){ const ac=AGENCY_COLORS[actor.agency]||'#aaa'; tags.innerHTML+=`<span class="dtag" style="background:${ac}22;color:${ac}">${actor.agency}${actor.sub?' · '+actor.sub:''}</span>`; }
  document.getElementById('d-works').innerHTML=actor.works.map(w=>{
    const c=RC[w.role]||'#9CA3AF', sales=SALES[w.title];
    return `<div class="wcard" style="border-left-color:${c}">
      <div class="wtitle">${w.title}</div>
      <div class="wmeta"><span class="wdate">${w.date}</span><span class="wrtag" style="background:${RB[w.role]||'#f3f4f6'};color:${c}">${w.role}</span></div>
      ${sales?`<span class="sales-badge">📦 ${sales.toLocaleString()} 本</span>`:''}
    </div>`;
  }).join('');
  let ch=costars.length?costars.map(c=>`<span class="chip" onclick="selectActor('${c}')">${c}</span>`).join(''):`<span style="font-size:0.7rem;color:var(--muted)">暂无共演记录</span>`;
  if(actor.agency){ const mates=(agencyMap[actor.agency]||[]).filter(n=>n!==name); if(mates.length){ const ac=AGENCY_COLORS[actor.agency]||'#aaa'; ch+=`<div style="width:100%;margin-top:6px;font-size:0.62rem;color:var(--muted)">同事务所</div>`+mates.map(c=>`<span class="chip" style="border-color:${ac}66" onclick="selectActor('${c}')">${c}</span>`).join(''); } }
  document.getElementById('d-costars').innerHTML=ch;
  document.getElementById('d-stats').innerHTML=`
    <div class="stat"><div class="snum">${actor.works.length}</div><div class="slbl">作品数</div></div>
    <div class="stat"><div class="snum">${costars.length}</div><div class="slbl">共演人数</div></div>
    <div class="stat"><div class="snum" style="font-size:0.75rem">${actor.agency||'—'}</div><div class="slbl">事务所</div></div>`;
  document.getElementById('detail').classList.add('open');
  setTimeout(()=>{ if(simulation) simulation.restart(); }, 260);
  hlActor(name);
  document.querySelectorAll('.aitem').forEach(el=>el.classList.toggle('on',el.dataset.name===name));
}

function hlActor(name) {
  const connected=new Set([name]);
  linkSel&&linkSel.each(d=>{ const s=typeof d.source==='object'?d.source.id:d.source, t=typeof d.target==='object'?d.target.id:d.target; if(s===name) connected.add(t); if(t===name) connected.add(s); });
  nodeSel&&nodeSel.classed('dim',d=>!connected.has(d.id));
  linkSel&&linkSel
    .classed('dim',d=>{ const s=typeof d.source==='object'?d.source.id:d.source,t=typeof d.target==='object'?d.target.id:d.target; return s!==name&&t!==name; })
    .classed('hl',d=>{ const s=typeof d.source==='object'?d.source.id:d.source,t=typeof d.target==='object'?d.target.id:d.target; return s===name||t===name; });
}
function clearHL() { nodeSel&&nodeSel.classed('dim',false); linkSel&&linkSel.classed('dim',false).classed('hl',false); document.querySelectorAll('.aitem').forEach(el=>el.classList.remove('on')); }
function closeDetail() { document.getElementById('detail').classList.remove('open'); clearHL(); }
function setFilter(f,btn) { curFilter=f; document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); init(); closeDetail(); }
function renderList(q='') {
  const list=document.getElementById('alist');
  const items=ACTORS.filter(a=>(curFilter==='全部'||getRole(a)===curFilter)&&a.name.includes(q));
  list.innerHTML=items.map(a=>{ const r=getRole(a), ac=a.agency?AGENCY_COLORS[a.agency]||'#aaa':'';
    return `<div class="aitem" data-name="${a.name}" onclick="selectActor('${a.name}')">
      <div class="adot" style="background:${RC[r]}"></div>
      <div class="aname">${a.name}${a.agency?`<span style="font-size:0.58rem;color:${ac};margin-left:3px">${a.agency}</span>`:''}</div>
      <span class="abadge" style="background:${RB[r]};color:${RC[r]}">${r}</span>
    </div>`; }).join('');
}

window.addEventListener('resize',()=>{ if(simulation) simulation.restart(); });

// 启动：先加载数据再渲染
(async () => {
  const ok = await loadData();
  if(ok) { buildMaps(); init(); }
  document.getElementById('loading').classList.add('hidden');
})();
</script>
